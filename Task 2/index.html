<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="style-header.css"/>
    <link rel="stylesheet" href="style-promo.css"/>
    <link rel="stylesheet" href="style-cards.css"/>
    <link rel="stylesheet" href="style-footer.css"/>
  </head>
  <body>
    <div id="app"></div>

    <script type="text/babel">
      const container = document.getElementById("app");

      class Header extends React.Component {
        render() {
          return (
            <div className="headerContainer">
              <div className="headerWrapper">
                <div className="logoWrapper">
                  <img className="logo" src={this.props.logo} alt={"Netflix logo"}/>
                </div>

                <div className="nav">
                  <a className="navLink" href={"#"}>{this.props.link1}</a>
                  <a className="navLink" href={"#"}>{this.props.link2}</a>
                  <a className="navLink" href={"#"}>{this.props.link3}</a>
                  <a className="navLink" href={"#"}>{this.props.link4}</a>
                </div>
              </div>

              <div className="headerWrapper">
                <div className="search">
                  <img className="searchIcon" src={this.props.search} alt={"logo "}/>
                </div>
                <div className="headerBtn">
                  <button className="btn">Sign out</button>
                </div>
              </div>
            </div>
          );
        }
      }

      class Promo extends React.Component {
        render() {
          return (
            <div className="promoContainer">
              <div className="promoContent">
                <h1 className="title">{this.props.title}</h1>
                <p className="promoText">{this.props.text}</p>
                <button className="promoBtn">{this.props.btn}</button>
              </div>
            </div>
          );
        }
      }

      class Cards extends React.Component {
        render() {
          return (
            <div className="CardsContainer">
              <h2 className="cardsTitle">Action Thriller Movies</h2>
              <div className="cards">
                <div className="card">
                  <img className="cardImg" src={this.props.img1} alt="movies img"/>
                  <span className="movieName">{this.props.name1}</span>
                </div>
                <div className="card">
                  <img className="cardImg" src={this.props.img2} alt="movies img"/>
                  <span className="movieName">{this.props.name2}</span>
                </div>
                <div className="card">
                  <img className="cardImg" src={this.props.img3} alt="movies img"/>
                  <span className="movieName">{this.props.name3}</span>
                </div>
                <div className="card">
                  <img className="cardImg" src={this.props.img4} alt="movies img"/>
                  <span className="movieName">{this.props.name4}</span>
                </div>
                <div className="card">
                  <img className="cardImg" src={this.props.img5} alt="movies img"/>
                  <span className="movieName">{this.props.name5}</span>
                </div>
              </div>
            </div>
          );
        }
      }

      class Footer extends React.Component {
        render() {
          return (
            <div className="footerContainer">
                <a className="footerLink" href="#">{this.props.footerLink1}</a>
                <a className="footerLink" href="#">{this.props.footerLink2}</a>
                <a className="footerLink" href="#">{this.props.footerLink3}</a>
                <a className="footerLink" href="#">{this.props.footerLink4}</a>
                <a className="footerLink" href="#">{this.props.footerLink5}</a>
                <a className="footerLink" href="#">{this.props.footerLink6}</a>
                <a className="footerLink" href="#">{this.props.footerLink7}</a>
                <a className="footerLink" href="#">{this.props.footerLink8}</a>
                <a className="footerLink" href="#">{this.props.footerLink9}</a>
                <a className="footerLink" href="#">{this.props.footerLink10}</a>
                <a className="footerLink" href="#">{this.props.footerLink11}</a>
                <a className="footerLink" href="#">{this.props.footerLink12}</a>
                <a className="footerLink" href="#">{this.props.footerLink13}</a>
                <a className="footerLink" href="#">{this.props.footerLink14}</a>
                <a className="footerLink" href="#">{this.props.footerLink15}</a>
            </div>
          );
        }
      }

      const App = (
        <div>
          <Header
            logo={
              "https://wallpapers.com/images/featured/netflix-logo-png-fqwt81hprrz7xsfg.jpg"
            }
            link1={"Home"}
            link2={"Series"}
            link3={"Films"}
            link4={"My list"}
            search={
              "https://www.shutterstock.com/shutterstock/videos/3747062809/thumb/1.jpg?ip=x480"
            }
          />
          <Promo
            title={"Movies"}
            text={"Movies—scary, funny, dramatic, romantic—make us experience a whole range of emotions. Lots of movies—lots of experiences!"}
            btn={"Finish Sign-Up"}
          />
          <Cards
            img1={"https://occ-0-769-768.1.nflxso.net/dnm/api/v6/mAcAr9TxZIVbINe88xb3Teg5_OA/AAAABdHzyCLkikE5Qz3hlGG9j51Nmm8WIC3dUAHHFvq7ljdSAvaqnOpP1maFA92Uw8NQ3nHngeYEEO13aUg8orCg-MRk0QiAtYxVZblicSlGm0NZNdH5J9owlY-dOaPXp6K3kysVGzQrkNQ.jpg?r=53c"}
            name1={"Havok"}
            img2={"https://occ-0-769-768.1.nflxso.net/dnm/api/v6/mAcAr9TxZIVbINe88xb3Teg5_OA/AAAABagvFYqX2fskP8ux4iCzVoAPW-W2KSpX5PJ7V7suk9Ub9WM6jlY5VNeX4jAAoDDh8S5IeqBHskWXf8jm3xGxcTyhXSsEEz5l5X3KFGnp_w.jpg?r=317"}
            name2={"Gemini man"}
            img3={"https://occ-0-769-768.1.nflxso.net/dnm/api/v6/mAcAr9TxZIVbINe88xb3Teg5_OA/AAAABUPGhALeoH-khdxTGjh3Sfzx29otO86ZRkh6Icld6Q7LyxHBAazvZmklMt6ajeUu1Xw_ljxC_DJY5G2c8rub60yumU52w0JlMoMsZjk6qw.jpg?r=8b3"}
            name3={"Shooter"}
            img4={"https://occ-0-769-768.1.nflxso.net/dnm/api/v6/mAcAr9TxZIVbINe88xb3Teg5_OA/AAAABY8CcdLTg7fvgyKIvVwS9ngAmHsIVLTpBuy9d3NrW1u8fxnbid9Ezn3PZBubPsqdFUUEaEgnR7XTU_nS8x-TMlOkK4kRhV38NHbnzmh4UQ.jpg?r=26f"}
            name4={"13 Hours: The secret"}
            img5={"https://occ-0-769-768.1.nflxso.net/dnm/api/v6/mAcAr9TxZIVbINe88xb3Teg5_OA/AAAABfgK7xneVvFZTonA51V-Esa4SN2r-TTzsX9Z2OEqWo9SLCRd9qsydszPg5k0osQpAKO8J0N5fjUioT8uTOe4QieqghdFnJZT52ASYZyFqQ.jpg?r=945"}
            name5={"Inglourious Basters"}
          />
          <Footer
            footerLink1={"FAQ"}
            footerLink2={"Investor Relations"}
            footerLink3={"Privacy"}
            footerLink4={"Speed Test"}
            footerLink5={"Help Center"}
            footerLink6={"Jobs"}
            footerLink7={"Cookie Preferences"}
            footerLink8={"Legal Notices"}
            footerLink9={"Account"}
            footerLink10={"Ways to Watch"}
            footerLink11={"Corporate Information"}
            footerLink12={"Only on Netflix"}
            footerLink13={"Media Center"}
            footerLink14={"Terms of Use"}
            footerLink15={"Contact Us"}
          />
        </div>
      );

      ReactDOM.createRoot(container).render(App);
    </script>
  </body>
</html>
